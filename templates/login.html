<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — Filebrowser</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f17;--card:#151828;--card2:#1d2036;--border:#262a40;
  --accent:#6e78ff;--accent-lt:#8b94ff;--danger:#ff5f5f;--danger-lt:#ff8080;
  --text:#dde1f2;--muted:#787ca0;
  --font:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,sans-serif;
  --r:10px;--r-sm:6px;--shadow:0 4px 24px rgba(0,0,0,.55);--t:130ms ease;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2.75rem 2.25rem;width:100%;max-width:390px;box-shadow:var(--shadow)}
.brand{font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:2rem;letter-spacing:-.02em}
.field{margin-bottom:1.15rem}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.4rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.field input{width:100%;padding:.68em .95em;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:1rem;font-family:var(--font);transition:border-color var(--t),box-shadow var(--t);appearance:none}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(110,120,255,.2)}
.btn-submit{display:flex;align-items:center;justify-content:center;width:100%;padding:.68em 1.4em;margin-top:.9rem;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:var(--r-sm);font-size:1rem;font-family:var(--font);font-weight:600;cursor:pointer;transition:background var(--t),border-color var(--t),transform var(--t)}
.btn-submit:hover{background:var(--accent-lt);border-color:var(--accent-lt)}
.btn-submit:active{transform:scale(.97)}
.alert{background:rgba(255,95,95,.1);border:1px solid var(--danger);border-radius:var(--r-sm);padding:.65em 1em;color:var(--danger);font-size:.88rem;margin-bottom:1.25rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">🗂 Filebrowser</div>
    {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}
    <form method="POST" action="/login" autocomplete="on">
      <div class="field">
        <label for="u">Username</label>
        <input id="u" name="username" type="text" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="p">Password</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn-submit" type="submit">Sign in →</button>
    </form>
  </div>
</div>
</body>
</html>
